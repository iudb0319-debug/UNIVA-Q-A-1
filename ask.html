<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIVA Q&A — 質問する</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-logo" style="cursor:pointer" onclick="location.href='board.html'">
      ‹ UNIVA Q&A
    </div>
    <div class="header-right">
      <span class="header-username" id="header-username"></span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">ログアウト</button>
    </div>
  </header>

  <div class="page-container fade-in">
    <div class="ask-page">
      <div class="card ask-card">
        <div class="ask-page-title">NEW QUESTION</div>
        <div id="alert-area"></div>

        <div class="ask-form">
          <div class="form-group">
            <label class="form-label" for="ask-title">質問タイトル <span style="color:var(--error)">*</span></label>
            <input class="form-input" type="text" id="ask-title" placeholder="例: 卒業要件の単位数を教えてください" maxlength="100">
          </div>

          <div class="form-group">
            <label class="form-label" for="ask-body">質問内容 <span style="color:var(--error)">*</span></label>
            <textarea class="form-textarea" id="ask-body" rows="6"
              placeholder="できるだけ具体的に記載してください。NotebookLMが大学資料を元に回答します。"
              style="min-height:160px;"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="ask-genre">ジャンル</label>
            <select class="form-select" id="ask-genre">
              <option value="">選択してください</option>
              <option value="履修">履修</option>
              <option value="就職">就職</option>
              <option value="キャンパス">キャンパス</option>
              <option value="制度">制度</option>
              <option value="その他">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">タグ（Enterで追加、最大5個）</label>
            <div class="tag-input-area" id="tag-area" onclick="document.getElementById('tag-input').focus()">
              <input type="text" id="tag-input" placeholder="タグを入力…" maxlength="20">
            </div>
          </div>

          <div style="display:flex;gap:12px;justify-content:flex-end;">
            <button class="btn btn-secondary" onclick="location.href='board.html'">キャンセル</button>
            <button class="btn btn-primary btn-lg" id="submit-btn" onclick="doSubmit()">
              質問を投稿する →
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let tags = [];

    function addTag(txt) {
      txt = txt.trim();
      if (!txt || tags.includes(txt) || tags.length >= 5) return;
      tags.push(txt);
      renderTags();
    }
    function removeTagAt(i) {
      tags.splice(i, 1);
      renderTags();
    }
    function renderTags() {
      const area  = document.getElementById("tag-area");
      const input = document.getElementById("tag-input");
      // タグチップを再描画
      area.querySelectorAll(".tag-removable").forEach(el => el.remove());
      tags.forEach((t, i) => {
        const chip = document.createElement("span");
        chip.className = "tag-removable";
        chip.innerHTML = `${Utils.esc(t)} <button class="tag-remove" onclick="removeTagAt(${i})">✕</button>`;
        area.insertBefore(chip, input);
      });
    }

    document.getElementById("tag-input").addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === ",") {
        e.preventDefault();
        addTag(e.target.value);
        e.target.value = "";
      } else if (e.key === "Backspace" && !e.target.value && tags.length) {
        removeTagAt(tags.length - 1);
      }
    });

    async function doSubmit() {
      const title = document.getElementById("ask-title").value.trim();
      const body  = document.getElementById("ask-body").value.trim();
      const genre = document.getElementById("ask-genre").value;
      const alert = document.getElementById("alert-area");
      const btn   = document.getElementById("submit-btn");

      if (!title) { Utils.showAlert(alert, "タイトルを入力してください"); return; }
      if (!body)  { Utils.showAlert(alert, "質問内容を入力してください"); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;"></span> 投稿中…';

      const res = await Api.createQuestion(Auth.token(), title, body, genre, tags);
      btn.disabled = false;
      btn.innerHTML = "質問を投稿する →";

      if (!res.success) { Utils.showAlert(alert, res.error); return; }
      location.href = `question.html?qid=${encodeURIComponent(res.data.qid)}`;
    }

    document.addEventListener("DOMContentLoaded", () => {
      Auth.require();
      Auth.setHeaderUser();
      document.getElementById("logout-btn")?.addEventListener("click", () => Auth.logout());
    });
    window.removeTagAt = removeTagAt;
  </script>
</body>
</html>
